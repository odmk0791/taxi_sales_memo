<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>営業メモ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#ffffff; --bg2:#f4f3ef; --bg3:#eae9e3;
      --txt:#1a1a18; --txt2:#5c5c57; --txt3:#9c9a92;
      --bdr:rgba(0,0,0,0.13); --bdr2:rgba(0,0,0,0.25);
      --ok:#1d6b44; --ok-bg:#eaf3de; --ok-bd:rgba(29,107,68,.3);
      --info:#185fa5; --info-bg:#e6f1fb; --info-bd:rgba(24,95,165,.3);
      --warn:#ba7517; --warn-bg:#faeeda; --warn-bd:rgba(186,117,23,.3);
      --err:#a32d2d; --err-bg:#fcebeb; --err-bd:rgba(163,45,45,.3);
      --sans:"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;
      --mono:"SF Mono","Courier New",monospace;
      --r:8px; --rl:12px;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --bg:#1c1c1a; --bg2:#252523; --bg3:#141412;
        --txt:#e8e6de; --txt2:#9c9a92; --txt3:#6c6a62;
        --bdr:rgba(255,255,255,.10); --bdr2:rgba(255,255,255,.20);
        --ok:#5dcaa5; --ok-bg:#04342c; --ok-bd:rgba(93,202,165,.3);
        --info:#85b7eb; --info-bg:#042c53; --info-bd:rgba(133,183,235,.3);
        --warn:#ef9f27; --warn-bg:#412402; --warn-bd:rgba(239,159,39,.3);
        --err:#f09595; --err-bg:#501313; --err-bd:rgba(240,149,149,.3);
      }
    }
    html,body,#root{height:100%;}
    body{background:var(--bg3);font-family:var(--sans);color:var(--txt);-webkit-text-size-adjust:100%;}
    input,button,select{font-family:var(--sans);font-size:16px;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
    button{-webkit-tap-highlight-color:transparent;}
    textarea{font-family:var(--sans);font-size:15px;resize:vertical;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* =====================================================
   ★ Googleフォーム設定 ★
   ===================================================== */
const FORM_ID = "";
const FIELDS = {
  date:"entry.0000000001",    dow:"entry.0000000002",
  pTime:"entry.0000000003",   dTime:"entry.0000000004",  jitsu:"entry.0000000005",
  pWard:"entry.0000000006",   pArea:"entry.0000000007",
  dWard:"entry.0000000008",   dArea:"entry.0000000009",
  fare:"entry.0000000010",    acc:"entry.0000000011",
  stat:"entry.0000000012",    pay:"entry.0000000013",
  sankyu:"entry.0000000014",  kotei:"entry.0000000015",
  yuusen:"entry.0000000016",  easternName:"entry.0000000017",
  memo:"entry.0000000018",
};

const LOC_CSV   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSpOj4QzyarqZtTDM5bld8QDEIzRodRLUwAfF8u42CbgTuGPoKqWrOKtw2Ddrhm0OnONlVnzwc8c1BX/pub?gid=657495537&single=true&output=csv";
const STORE_KEY  = "eimu_trips_v2";
const KUUTEN_KEY = "eimu_kuutens_v1";

const PAYMENT_OPTS = ["GO Pay","現金","クレジット","IC","QRコード","チケット","福祉券","イースタン","商品券","その他"];
const ACCOUNT_OPTS = ["専用","通常","プレタク"];
const STATUS_OPTS  = ["GO","流し","スマ配"];
const SANKYU_OPTS  = ["通常","サンキュー","プレタク","プレタクP"];
const KOTEI_OPTS   = ["N","L","M","S"];
const KOTEI_LABELS = {N:"なし",L:"Long",M:"Middle",S:"Short"};
const DOW_JP = ["日","月","火","水","木","金","土"];
const PAY_CLR = {"GO Pay":"var(--warn)","現金":"var(--ok)","クレジット":"var(--info)","IC":"var(--info)","QRコード":"var(--warn)"};
const SHIFT_START_HOUR = 16;

const {useState,useEffect,useMemo,useCallback} = React;
const pad2 = n => String(n).padStart(2,"0");

/* ── 時刻・日付（16時シフト対応）── */
function getShiftNow(){
  const d=new Date(), h=d.getHours();
  return `${pad2(h < SHIFT_START_HOUR ? h+24 : h)}:${pad2(d.getMinutes())}`;
}
function getShiftDate(){
  const d=new Date();
  if(d.getHours() < SHIFT_START_HOUR) d.setDate(d.getDate()-1);
  return `${d.getFullYear()}/${pad2(d.getMonth()+1)}/${pad2(d.getDate())}`;
}
const getDow = s=>{
  if(!s)return"";
  const d=new Date(s.replace(/\//g,"-"));
  return isNaN(d)?"":DOW_JP[d.getDay()]||"";
};

/* ── 実車時間計算 ── */
function calcJitsu(p,d){
  const toM=t=>{if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+(m||0);};
  const pm=toM(p),dm=toM(d);
  if(pm==null||dm==null)return"";
  let diff=dm-pm; if(diff<0)diff+=24*60;
  return `${Math.floor(diff/60)}:${pad2(diff%60)}`;
}

/* ── 住所パース ── */
function parseAddr(addr){
  if(!addr)return{ward:"その他",area:""};
  const m=addr.match(/^(.+?[区市郡])(.+)$/);
  return m?{ward:m[1],area:m[2]}:{ward:"その他",area:addr};
}

/* ── 料金フォーマット ── */
function fmtFare(n){
  const v=parseInt(String(n).replace(/[^0-9]/g,""));
  return isNaN(v)?"":"¥"+v.toLocaleString();
}

/* ── Haversine距離（km）── */
function haversine(lat1,lon1,lat2,lon2){
  const R=6371, toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1), dLon=toR(lon2-lon1);
  const a=Math.sin(dLat/2)**2 +
          Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ── DBから緯度・経度を読む（複数の列名に対応）── */
function extractLatLng(row){
  const lat = parseFloat(
    row["緯度"]||row["lat"]||row["latitude"]||row["Lat"]||row["LAT"]||""
  );
  const lng = parseFloat(
    row["経度"]||row["lng"]||row["longitude"]||row["Lng"]||row["LON"]||row["lon"]||""
  );
  return (isNaN(lat)||isNaN(lng)) ? null : {lat,lng};
}

/* ── GPS：最寄り地点を検索 ── */
function findNearest(lat,lng,locList){
  let best=null, bestDist=Infinity;
  for(const loc of locList){
    if(!loc.lat||!loc.lng)continue;
    const d=haversine(lat,lng,loc.lat,loc.lng);
    if(d<bestDist){bestDist=d;best=loc;}
  }
  return best ? {...best, distM:Math.round(bestDist*1000)} : null;
}

/* ── GPS取得 Promise ── */
function getGPS(timeoutMs=8000){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject(new Error("GPS非対応"));return;}
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy)}),
      e=>reject(new Error(e.code===1?"位置情報の許可が必要です":e.code===2?"GPS取得失敗":"タイムアウト")),
      {enableHighAccuracy:true,timeout:timeoutMs,maximumAge:0}
    );
  });
}

/* ── Google Forms 送信 ── */
async function submitToForm(trip){
  if(!FORM_ID)return false;
  const url=`https://docs.google.com/forms/d/${FORM_ID}/formResponse`;
  const body=new FormData();
  const map={
    [FIELDS.date]:trip.date,       [FIELDS.dow]:trip.dow,
    [FIELDS.pTime]:trip.pTime,     [FIELDS.dTime]:trip.dTime,  [FIELDS.jitsu]:trip.jitsu,
    [FIELDS.pWard]:trip.pWard,     [FIELDS.pArea]:trip.pArea,
    [FIELDS.dWard]:trip.dWard,     [FIELDS.dArea]:trip.dArea,
    [FIELDS.fare]:fmtFare(trip.fare), [FIELDS.acc]:trip.acc,
    [FIELDS.stat]:trip.stat,       [FIELDS.pay]:trip.pay,
    [FIELDS.sankyu]:trip.sankyu,   [FIELDS.kotei]:trip.kotei,
    [FIELDS.yuusen]:trip.yuusen?"優":"",
    [FIELDS.easternName]:trip.easternName||"",
    [FIELDS.memo]:trip.memo||"",
  };
  Object.entries(map).forEach(([k,v])=>body.append(k,v));
  try{await fetch(url,{method:"POST",mode:"no-cors",body});return true;}
  catch{return false;}
}

/* ══════════════════════════════════════
   スタイル定数
══════════════════════════════════════ */
const S={
  wrap: {maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"var(--bg3)"},
  hdr:  {background:"var(--bg)",borderBottom:"0.5px solid var(--bdr)",padding:"11px 14px",
         display:"flex",alignItems:"center",justifyContent:"space-between",
         position:"sticky",top:0,zIndex:10},
  body: {padding:"10px 12px 100px"},
  card: {background:"var(--bg)",borderRadius:"var(--rl)",border:"0.5px solid var(--bdr)",
         padding:"11px 13px",marginBottom:8},
  lbl:  {fontSize:12,color:"var(--txt2)",margin:"0 0 5px",display:"block"},
  inp:  {width:"100%",padding:"9px 10px",border:"0.5px solid var(--bdr2)",
         borderRadius:"var(--r)",fontSize:16,background:"var(--bg)",
         color:"var(--txt)",boxSizing:"border-box",outline:"none"},
  fab:  {position:"fixed",bottom:20,right:20,width:56,height:56,borderRadius:"50%",
         background:"var(--bg)",border:"0.5px solid var(--bdr2)",fontSize:26,
         cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
         color:"var(--txt)",zIndex:20,boxShadow:"0 2px 12px rgba(0,0,0,.15)"},
  fab2: {position:"fixed",bottom:86,right:20,height:38,padding:"0 14px",borderRadius:19,
         background:"var(--err-bg)",border:"0.5px solid var(--err-bd)",
         cursor:"pointer",display:"flex",alignItems:"center",gap:5,
         color:"var(--err)",zIndex:20,fontSize:13,fontWeight:500,
         boxShadow:"0 2px 8px rgba(0,0,0,.10)"},
};

/* ══════════════════════════════════════
   共通コンポーネント
══════════════════════════════════════ */
function Toggle({on,onToggle,label,sub,color}){
  const c=color||"var(--info)";
  return <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
    <div>
      <p style={{fontSize:14,fontWeight:on?500:400,color:on?c:"var(--txt)",margin:0}}>{label}</p>
      {sub&&<p style={{fontSize:11,color:"var(--txt3)",margin:"2px 0 0"}}>{sub}</p>}
    </div>
    <button onClick={onToggle} style={{
      width:46,height:26,borderRadius:13,padding:"0 2px",cursor:"pointer",flexShrink:0,
      background:on?`color-mix(in srgb, ${c} 15%, var(--bg))`:"var(--bg2)",
      border:`0.5px solid ${on?c:"var(--bdr2)"}`,display:"flex",alignItems:"center",
    }}>
      <div style={{width:20,height:20,borderRadius:"50%",background:on?c:"var(--txt3)",
                   marginLeft:on?"auto":0,transition:"margin .2s"}}/>
    </button>
  </div>;
}

function Chip({opts,val,onC,clrMap={}}){
  return <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:4}}>
    {opts.map(o=>{const cl=clrMap[o]||"var(--txt2)";return(
      <button key={o} onClick={()=>onC(o)} style={{
        padding:"7px 12px",borderRadius:20,fontSize:13,cursor:"pointer",
        border:`0.5px solid ${val===o?cl:"var(--bdr)"}`,
        background:val===o?"var(--bg2)":"var(--bg)",
        color:val===o?cl:"var(--txt2)",fontWeight:val===o?500:400,
      }}>{o}</button>
    );})}
  </div>;
}

function LocBtn({ward,area,lat,lng,onClick}){
  const hasGps=lat!=null&&lng!=null;
  return <button onClick={onClick} style={{
    width:"100%",padding:"10px 12px",border:"0.5px solid var(--bdr2)",
    borderRadius:"var(--r)",background:"var(--bg2)",
    color:ward?"var(--txt)":"var(--txt3)",fontSize:14,cursor:"pointer",
    textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"
  }}>
    <span>
      {ward?`${ward}　${area}`:"市区・地名を選択 →"}
      {hasGps&&<span style={{fontSize:11,color:"var(--ok)",marginLeft:6}}>
        <i className="ti ti-map-pin" style={{fontSize:11}}/> GPS
      </span>}
    </span>
    <i className="ti ti-chevron-right" style={{fontSize:14,color:"var(--txt3)"}}/>
  </button>;
}

function TimeRow({label,val,set,jitsuLabel}){
  return <div style={{marginBottom:10}}>
    <p style={{fontSize:11,color:jitsuLabel?"var(--info)":"var(--txt3)",margin:"0 0 4px"}}>
      {label}{jitsuLabel?` （実車 ${jitsuLabel}）`:""}
    </p>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <input value={val} onChange={e=>set(e.target.value)} placeholder="HH:MM" maxLength={5}
        style={{...S.inp,width:100,fontSize:22,fontFamily:"var(--mono)",textAlign:"center",
                padding:"8px 6px",flexShrink:0}}/>
      <button onClick={()=>set(getShiftNow())} style={{
        padding:"8px 14px",border:"0.5px solid var(--bdr2)",borderRadius:"var(--r)",
        background:"var(--bg2)",color:"var(--txt2)",fontSize:13,cursor:"pointer"
      }}>今の時刻</button>
    </div>
  </div>;
}

/* ══════════════════════════════════════
   App
══════════════════════════════════════ */
function App(){
  /* ── 住所DB（ward/area/lat/lng の配列）── */
  const [locList,setLocList]=useState([]); // [{ward,area,lat,lng,name}]
  const [locDB,setLocDB]=useState({});     // {ward:[area,...]}
  const [locLoad,setLocLoad]=useState(true);
  const [locN,setLocN]=useState(0);
  const [wards,setWards]=useState([]);

  /* ── データ ── */
  const [trips,setTrips]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(STORE_KEY)||"[]");}catch{return[];}
  });
  const [kuutens,setKuutens]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(KUUTEN_KEY)||"[]");}catch{return[];}
  });

  /* ── 画面制御 ── */
  const [screen,setScreen]=useState("log");
  const [editId,setEditId]=useState(null);
  const [copied,setCopied]=useState(false);
  const [sending,setSending]=useState(false);
  const [sendResult,setSendResult]=useState(null);

  /* ── 乗車記録フォーム ── */
  const [formDate,setFormDate]=useState(getShiftDate());
  const [fp,setFp]=useState(""); const [fd,setFd]=useState("");
  const [fpWard,setFpWard]=useState(""); const [fpArea,setFpArea]=useState("");
  const [fpLat,setFpLat]=useState(null); const [fpLng,setFpLng]=useState(null);
  const [fdWard,setFdWard]=useState(""); const [fdArea,setFdArea]=useState("");
  const [fdLat,setFdLat]=useState(null); const [fdLng,setFdLng]=useState(null);
  const [fare,setFare]=useState("");
  const [pay,setPay]=useState("GO Pay");
  const [acc,setAcc]=useState("専用");
  const [stat,setStat]=useState("GO");
  const [sankyu,setSankyu]=useState("通常");
  const [kotei,setKotei]=useState("N");
  const [yuusen,setYuusen]=useState(false);
  const [easternName,setEasternName]=useState("");
  const [memo,setMemo]=useState("");

  /* ── 空転フォーム ── */
  const [kType,setKType]=useState("A");
  const [kTime,setKTime]=useState("");
  const [kWard,setKWard]=useState(""); const [kArea,setKArea]=useState("");
  const [kLat,setKLat]=useState(null); const [kLng,setKLng]=useState(null);
  const [kFare,setKFare]=useState("500");
  const [kMemo,setKMemo]=useState("");

  /* ── 住所ピッカー ── */
  const [pickerFor,setPickerFor]=useState(null); // "p"|"d"|"k"
  const [pickWard,setPickWard]=useState("");
  const [areaQ,setAreaQ]=useState("");
  const [gpsState,setGpsState]=useState("idle"); // idle|loading|ok|err
  const [gpsMsg,setGpsMsg]=useState("");

  /* ── persist ── */
  useEffect(()=>{try{localStorage.setItem(STORE_KEY,JSON.stringify(trips));}catch{}},[trips]);
  useEffect(()=>{try{localStorage.setItem(KUUTEN_KEY,JSON.stringify(kuutens));}catch{}},[kuutens]);

  /* ── 住所DB読み込み（lat/lng も取得）── */
  useEffect(()=>{
    Papa.parse(LOC_CSV,{
      download:true,header:true,skipEmptyLines:true,
      complete:({data})=>{
        const db={};const list=[];let n=0;
        data.forEach(row=>{
          const name=row["住所名"]||row["名称"]||row["場所名"]||
                     Object.values(row).find(v=>v&&isNaN(v))||"";
          if(!name.trim())return;
          const{ward,area}=parseAddr(name.trim());
          const coords=extractLatLng(row);
          if(!db[ward])db[ward]=new Set();
          db[ward].add(area);
          list.push({ward,area,name:name.trim(),
                     lat:coords?.lat||null, lng:coords?.lng||null});
          n++;
        });
        const res={};
        Object.keys(db).sort().forEach(k=>{res[k]=Array.from(db[k]).sort();});
        setLocDB(res); setWards(Object.keys(res));
        setLocList(list); setLocN(n); setLocLoad(false);
      },
      error:()=>setLocLoad(false)
    });
  },[]);

  const pickerAreas=useMemo(()=>{
    const all=locDB[pickWard]||[];
    return areaQ?all.filter(a=>a.includes(areaQ)):all;
  },[locDB,pickWard,areaQ]);

  /* ── 住所ピッカーを開く ── */
  const openPicker=f=>{
    setPickerFor(f);
    setPickWard(f==="p"?fpWard:f==="d"?fdWard:kWard);
    setAreaQ(""); setGpsState("idle"); setGpsMsg("");
  };

  /* ── リストから住所を選択 ── */
  const pickArea=(a,ward)=>{
    const w=ward||pickWard;
    if(pickerFor==="p"){setFpWard(w);setFpArea(a);setFpLat(null);setFpLng(null);}
    else if(pickerFor==="d"){setFdWard(w);setFdArea(a);setFdLat(null);setFdLng(null);}
    else{setKWard(w);setKArea(a);setKLat(null);setKLng(null);}
    setPickerFor(null);
  };

  /* ── GPSで現在地を取得して最寄り住所をセット ── */
  const handleGPS=useCallback(async()=>{
    setGpsState("loading"); setGpsMsg("GPS取得中…");
    try{
      const {lat,lng,acc}=await getGPS();
      setGpsMsg(`精度 ±${acc}m で取得中…`);
      const nearest=findNearest(lat,lng,locList.filter(l=>l.lat));
      if(!nearest){setGpsState("err");setGpsMsg("近くの住所が見つかりませんでした");return;}
      /* 確認メッセージ */
      setGpsMsg(`📍 ${nearest.ward}${nearest.area}（約${nearest.distM}m）`);
      setGpsState("ok");
      /* セット */
      if(pickerFor==="p"){
        setFpWard(nearest.ward);setFpArea(nearest.area);
        setFpLat(lat);setFpLng(lng);
      }else if(pickerFor==="d"){
        setFdWard(nearest.ward);setFdArea(nearest.area);
        setFdLat(lat);setFdLng(lng);
      }else{
        setKWard(nearest.ward);setKArea(nearest.area);
        setKLat(lat);setKLng(lng);
      }
      /* 少し待ってから閉じる */
      setTimeout(()=>setPickerFor(null),1200);
    }catch(e){
      setGpsState("err");setGpsMsg(e.message||"GPS取得に失敗しました");
    }
  },[locList,pickerFor]);

  const jitsu=useMemo(()=>calcJitsu(fp,fd),[fp,fd]);

  /* ── フォームリセット ── */
  const resetTripForm=(t=null)=>{
    setEditId(t?t.id:null);
    setFormDate(t?t.date:getShiftDate());
    setFp(t?t.pTime:""); setFd(t?t.dTime:"");
    setFpWard(t?t.pWard:""); setFpArea(t?t.pArea:"");
    setFpLat(t?t.pLat:null); setFpLng(t?t.pLng:null);
    setFdWard(t?t.dWard:""); setFdArea(t?t.dArea:"");
    setFdLat(t?t.dLat:null); setFdLng(t?t.dLng:null);
    setFare(t?String(t.fare):"");
    setPay(t?t.pay:"GO Pay"); setAcc(t?t.acc:"専用");
    setStat(t?t.stat:"GO"); setSankyu(t?t.sankyu:"通常");
    setKotei(t?t.kotei:"N"); setYuusen(t?t.yuusen:false);
    setEasternName(t?t.easternName||"":"");
    setMemo(t?t.memo||"":"");
  };
  const resetKuutenForm=()=>{
    setKType("A");setKTime("");
    setKWard("");setKArea("");setKLat(null);setKLng(null);
    setKFare("500");setKMemo("");
  };

  /* ── 保存 ── */
  const saveTrip=async()=>{
    if(!fare)return;
    const trip={
      id:editId||Date.now(), date:formDate, dow:getDow(formDate),
      pTime:fp, dTime:fd, jitsu,
      pWard:fpWard, pArea:fpArea, pLat:fpLat, pLng:fpLng,
      dWard:fdWard, dArea:fdArea, dLat:fdLat, dLng:fdLng,
      fare:parseInt(fare.replace(/[^0-9]/g,""))||0,
      pay, acc, stat, sankyu, kotei, yuusen,
      easternName:pay==="イースタン"?easternName:"",
      memo, synced:false,
    };
    if(FORM_ID){
      setSending(true);
      const ok=await submitToForm(trip);
      trip.synced=ok;
      setSendResult(ok?"ok":"err");
      setTimeout(()=>setSendResult(null),3000);
      setSending(false);
    }
    setTrips(ts=>editId?ts.map(t=>t.id===editId?trip:t):[...ts,trip]);
    setScreen("log");
  };

  const saveKuuten=()=>{
    setKuutens(ks=>[...ks,{
      id:Date.now(), date:getShiftDate(),
      kType, time:kTime, ward:kWard, area:kArea,
      lat:kLat, lng:kLng,
      fare:parseInt(kFare)||0, memo:kMemo,
    }]);
    resetKuutenForm(); setScreen("log");
  };

  /* ── CSV エクスポート ── */
  const doExport=()=>{
    const h="日付,曜日,乗車時間,降車時間,実車時間,乗車地：市区,乗車地：地名,乗車地：緯度,乗車地：経度,降車地：市区,降車地：地名,降車地：緯度,降車地：経度,料金,アカウント,ステータス,支払,サンキュー,固定客,優先パス,イースタン氏名,メモ";
    const rows=trips.map(t=>[
      t.date,t.dow,t.pTime,t.dTime,t.jitsu,
      t.pWard,t.pArea,t.pLat||"",t.pLng||"",
      t.dWard,t.dArea,t.dLat||"",t.dLng||"",
      fmtFare(t.fare),t.acc,t.stat,t.pay,t.sankyu,t.kotei,
      t.yuusen?"優":"",t.easternName||"",t.memo||""
    ].join(",")).join("\n");
    let out=h+"\n"+rows;
    if(kuutens.length>0){
      out+="\n\n--- 空転記録 ---\n日付,種別,時刻,市区,地名,緯度,経度,金額,メモ\n";
      out+=kuutens.map(k=>[
        k.date,k.kType==="A"?"迎車キャンセル":"メーター空転",
        k.time,k.ward,k.area,k.lat||"",k.lng||"",fmtFare(k.fare),k.memo||""
      ].join(",")).join("\n");
    }
    navigator.clipboard.writeText(out)
      .then(()=>{setCopied(true);setTimeout(()=>setCopied(false),3000);})
      .catch(()=>alert("コピーに失敗しました"));
  };

  const total=trips.reduce((s,t)=>s+t.fare,0);
  const kuutenTotal=kuutens.reduce((s,k)=>s+k.fare,0);
  const unsyncedCount=FORM_ID?trips.filter(t=>!t.synced).length:0;

  /* ════════════════════════════════
     住所ピッカー画面
  ════════════════════════════════ */
  if(pickerFor) return (
    <div style={S.wrap}>
      <div style={{...S.hdr,gap:10}}>
        <button onClick={()=>setPickerFor(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--txt)",lineHeight:1}}>‹</button>
        <span style={{fontSize:15,fontWeight:500}}>
          {pickerFor==="p"?"乗車地":pickerFor==="d"?"降車地":"空転場所"}を選択
        </span>
        <span style={{fontSize:11,color:"var(--txt3)"}}>{locN>0?`${locN.toLocaleString()}件`:locLoad?"読込中…":""}</span>
      </div>

      {/* GPS ボタン */}
      <div style={{padding:"10px 12px",background:"var(--bg)",borderBottom:"0.5px solid var(--bdr)"}}>
        <button onClick={handleGPS} disabled={gpsState==="loading"} style={{
          width:"100%",padding:"11px",borderRadius:"var(--r)",cursor:"pointer",
          background:gpsState==="ok"?"var(--ok-bg)":gpsState==="err"?"var(--err-bg)":"var(--info-bg)",
          border:`0.5px solid ${gpsState==="ok"?"var(--ok-bd)":gpsState==="err"?"var(--err-bd)":"var(--info-bd)"}`,
          color:gpsState==="ok"?"var(--ok)":gpsState==="err"?"var(--err)":"var(--info)",
          display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          fontSize:14,fontWeight:500,
        }}>
          <i className={`ti ${gpsState==="loading"?"ti-loader-2":"ti-map-pin"}`}
             style={{fontSize:16,animation:gpsState==="loading"?"spin 1s linear infinite":""}}/>
          {gpsState==="idle"&&"現在地を使う（GPS）"}
          {gpsState==="loading"&&"取得中…"}
          {gpsState==="ok"&&gpsMsg}
          {gpsState==="err"&&gpsMsg}
        </button>
        {gpsState==="err"&&<p style={{fontSize:11,color:"var(--txt3)",marginTop:4,textAlign:"center"}}>下のリストから手動で選択できます</p>}
      </div>

      {/* 市区チップ */}
      <div style={{background:"var(--bg)",borderBottom:"0.5px solid var(--bdr)",padding:"8px 10px",overflowX:"auto",display:"flex",gap:6,WebkitOverflowScrolling:"touch"}}>
        {wards.map(w=>(
          <button key={w} onClick={()=>{setPickWard(w);setAreaQ("");}} style={{
            whiteSpace:"nowrap",padding:"6px 13px",borderRadius:20,cursor:"pointer",
            border:`0.5px solid ${pickWard===w?"var(--info)":"var(--bdr)"}`,
            background:pickWard===w?"var(--bg2)":"var(--bg)",
            color:pickWard===w?"var(--info)":"var(--txt2)",fontSize:13,flexShrink:0,
          }}>{w}</button>
        ))}
      </div>

      {/* 地名リスト */}
      {pickWard&&<>
        <div style={{padding:"8px 12px",background:"var(--bg3)"}}>
          <input value={areaQ} onChange={e=>setAreaQ(e.target.value)}
            placeholder={`${pickWard}内を絞り込み…`} style={S.inp}/>
        </div>
        <div style={{padding:"0 14px 80px"}}>
          {pickerAreas.length===0&&<p style={{color:"var(--txt3)",fontSize:13,padding:"16px 0"}}>{locLoad?"読込中…":"該当なし"}</p>}
          {pickerAreas.map((a,i)=>(
            <div key={i} onClick={()=>pickArea(a)} style={{padding:"12px 2px",borderBottom:"0.5px solid var(--bdr)",fontSize:15,cursor:"pointer",userSelect:"none"}}>{a}</div>
          ))}
        </div>
      </>}
      {!pickWard&&<p style={{color:"var(--txt3)",fontSize:13,padding:"16px 14px"}}>上の市区ボタンを選んでください</p>}

      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
      `}</style>
    </div>
  );

  /* ════════════════════════════════
     空転フォーム
  ════════════════════════════════ */
  if(screen==="kuuten") return (
    <div style={S.wrap}>
      <div style={{...S.hdr,gap:10}}>
        <button onClick={()=>setScreen("log")} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--txt)",lineHeight:1}}>‹</button>
        <p style={{fontSize:16,fontWeight:500,margin:0,color:"var(--err)"}}>空転を記録</p>
      </div>
      <div style={S.body}>
        <div style={S.card}>
          <label style={S.lbl}>空転の種別</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:4}}>
            {[["A","迎車キャンセル","予約が入ったがキャンセルに"],["B","メーター空転","連続配車中に客を発見しモードを抜けた"]].map(([t,name,desc])=>(
              <button key={t} onClick={()=>{setKType(t);setKFare("500");}} style={{
                padding:"10px 8px",borderRadius:"var(--r)",cursor:"pointer",textAlign:"left",
                border:`1.5px solid ${kType===t?"var(--err-bd)":"var(--bdr)"}`,
                background:kType===t?"var(--err-bg)":"var(--bg)",
              }}>
                <p style={{fontSize:13,fontWeight:500,color:kType===t?"var(--err)":"var(--txt)",margin:"0 0 2px"}}>{name}</p>
                <p style={{fontSize:11,color:"var(--txt3)",margin:0,lineHeight:1.4}}>{desc}</p>
              </button>
            ))}
          </div>
        </div>

        {kType==="A"&&(
          <div style={S.card}>
            <label style={S.lbl}>空転金額</label>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              {[["500","迎車のみ"],["1000","迎車＋予約"]].map(([v,l])=>(
                <button key={v} onClick={()=>setKFare(v)} style={{
                  flex:1,padding:"9px 8px",borderRadius:"var(--r)",cursor:"pointer",
                  border:`0.5px solid ${kFare===v?"var(--err-bd)":"var(--bdr)"}`,
                  background:kFare===v?"var(--err-bg)":"var(--bg)",
                  color:kFare===v?"var(--err)":"var(--txt2)",fontSize:13,
                }}>
                  <p style={{fontWeight:500,margin:"0 0 1px"}}>¥{parseInt(v).toLocaleString()}</p>
                  <p style={{fontSize:11,margin:0}}>{l}</p>
                </button>
              ))}
            </div>
            <input type="number" inputMode="numeric" value={kFare} onChange={e=>setKFare(e.target.value)}
              placeholder="金額" style={{...S.inp,fontFamily:"var(--mono)",textAlign:"right"}}/>
          </div>
        )}
        {kType==="B"&&(
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <label style={{...S.lbl,margin:0}}>空転金額</label>
              <span style={{fontSize:20,fontWeight:500,fontFamily:"var(--mono)"}}>¥500（固定）</span>
            </div>
          </div>
        )}

        <div style={S.card}>
          <label style={S.lbl}>空転時刻</label>
          <TimeRow label="" val={kTime} set={setKTime}/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>空転場所</label>
          <LocBtn ward={kWard} area={kArea} lat={kLat} lng={kLng} onClick={()=>openPicker("k")}/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>メモ</label>
          <textarea value={kMemo} onChange={e=>setKMemo(e.target.value)} rows={2}
            placeholder="備考など" style={{...S.inp,padding:"8px 10px",lineHeight:1.5}}/>
        </div>

        <button onClick={saveKuuten} style={{width:"100%",padding:14,background:"var(--err-bg)",border:"0.5px solid var(--err-bd)",borderRadius:"var(--rl)",fontSize:16,fontWeight:500,cursor:"pointer",color:"var(--err)",marginTop:4}}>
          空転を記録する
        </button>
        <button onClick={()=>setScreen("log")} style={{width:"100%",padding:12,background:"none",border:"none",fontSize:14,cursor:"pointer",color:"var(--txt2)",marginTop:4}}>キャンセル</button>
      </div>
    </div>
  );

  /* ════════════════════════════════
     乗車記録フォーム
  ════════════════════════════════ */
  if(screen==="form") return (
    <div style={S.wrap}>
      <div style={{...S.hdr,gap:10}}>
        <button onClick={()=>setScreen("log")} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--txt)",lineHeight:1}}>‹</button>
        <div>
          <p style={{fontSize:16,fontWeight:500,margin:0}}>{editId?"記録を編集":"新規乗車記録"}</p>
          {sendResult&&<p style={{fontSize:11,color:sendResult==="ok"?"var(--ok)":"var(--err)",margin:0}}>{sendResult==="ok"?"✓ 送信しました":"⚠ 送信に失敗（保存済）"}</p>}
        </div>
      </div>
      <div style={S.body}>

        <div style={S.card}>
          <label style={S.lbl}>日付（自動：16時未満は前日扱い）</label>
          <input value={formDate} onChange={e=>setFormDate(e.target.value)} placeholder="YYYY/MM/DD" style={S.inp}/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>乗降時刻（深夜は自動で25:xx〜に変換）</label>
          <TimeRow label="乗車" val={fp} set={setFp}/>
          <TimeRow label="降車" val={fd} set={setFd} jitsuLabel={jitsu}/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>乗車地</label>
          <LocBtn ward={fpWard} area={fpArea} lat={fpLat} lng={fpLng} onClick={()=>openPicker("p")}/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>降車地</label>
          <LocBtn ward={fdWard} area={fdArea} lat={fdLat} lng={fdLng} onClick={()=>openPicker("d")}/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>料金（円）</label>
          <input type="number" inputMode="numeric" value={fare} onChange={e=>setFare(e.target.value)} placeholder="0"
            style={{...S.inp,fontSize:28,fontFamily:"var(--mono)",textAlign:"right",padding:"10px 12px"}}/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>支払</label>
          <Chip opts={PAYMENT_OPTS} val={pay} onC={setPay} clrMap={PAY_CLR}/>
          {pay==="イースタン"&&(
            <div style={{marginTop:10}}>
              <label style={{...S.lbl,color:"var(--warn)"}}>お客様氏名（イースタン報告用）</label>
              <input value={easternName} onChange={e=>setEasternName(e.target.value)}
                placeholder="例：山田 太郎" style={S.inp}/>
            </div>
          )}
        </div>

        <div style={S.card}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div><label style={S.lbl}>アカウント</label><Chip opts={ACCOUNT_OPTS} val={acc} onC={setAcc}/></div>
            <div><label style={S.lbl}>ステータス</label><Chip opts={STATUS_OPTS} val={stat} onC={setStat}/></div>
          </div>
        </div>

        <div style={S.card}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div><label style={S.lbl}>サンキュー</label><Chip opts={SANKYU_OPTS} val={sankyu} onC={setSankyu}/></div>
            <div>
              <label style={S.lbl}>固定（固定客）</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:4}}>
                {KOTEI_OPTS.map(o=>(
                  <button key={o} onClick={()=>setKotei(o)} style={{
                    padding:"6px 10px",borderRadius:20,fontSize:13,cursor:"pointer",
                    border:`0.5px solid ${kotei===o?"var(--info)":"var(--bdr)"}`,
                    background:kotei===o?"var(--bg2)":"var(--bg)",
                    color:kotei===o?"var(--info)":"var(--txt2)",fontWeight:kotei===o?500:400,
                  }}>
                    {o}<span style={{fontSize:10,marginLeft:3,opacity:.7}}>{KOTEI_LABELS[o]}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div style={S.card}>
          <Toggle on={yuusen} onToggle={()=>setYuusen(v=>!v)}
            label="優先パス" sub="該当する場合のみON（約20件に1回）" color="var(--warn)"/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>メモ・備忘録</label>
          <textarea value={memo} onChange={e=>setMemo(e.target.value)} rows={3}
            placeholder="案件のメモ、気になったこと等"
            style={{...S.inp,padding:"8px 10px",lineHeight:1.6}}/>
        </div>

        <button onClick={saveTrip} disabled={!fare||sending} style={{
          width:"100%",padding:14,background:"var(--bg)",border:"0.5px solid var(--bdr2)",
          borderRadius:"var(--rl)",fontSize:16,fontWeight:500,
          cursor:fare&&!sending?"pointer":"default",
          color:"var(--txt)",opacity:fare&&!sending?1:0.4,marginTop:4
        }}>
          {sending?"送信中…":(FORM_ID?"✓ 保存してシートへ送信":"✓ 保存する")}
        </button>
        <button onClick={()=>setScreen("log")} style={{width:"100%",padding:12,background:"none",border:"none",fontSize:14,cursor:"pointer",color:"var(--txt2)",marginTop:4}}>キャンセル</button>
      </div>
    </div>
  );

  /* ════════════════════════════════
     ログ一覧
  ════════════════════════════════ */
  return (
    <div style={S.wrap}>
      <div style={S.hdr}>
        <div>
          <p style={{fontSize:16,fontWeight:500,margin:0}}>営業メモ</p>
          <p style={{fontSize:11,color:"var(--txt2)",margin:0}}>
            {trips[0]?.date||getShiftDate()} — 乗車{trips.length}件 / 空転{kuutens.length}件
            {unsyncedCount>0&&<span style={{color:"var(--warn)",marginLeft:6}}>未送信{unsyncedCount}</span>}
          </p>
        </div>
        <div style={{display:"flex",gap:6}}>
          {(trips.length>0||kuutens.length>0)&&(
            <button onClick={doExport} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 11px",background:"var(--bg2)",border:"0.5px solid var(--bdr2)",borderRadius:"var(--r)",fontSize:13,cursor:"pointer",color:"var(--txt)"}}>
              <i className="ti ti-copy"/>{copied?"済 ✓":"CSV"}
            </button>
          )}
          {(trips.length>0||kuutens.length>0)&&(
            <button onClick={()=>{if(confirm("今日の全記録を削除しますか？")){setTrips([]);setKuutens([]);}}} style={{padding:"7px 10px",background:"var(--bg2)",border:"0.5px solid var(--bdr2)",borderRadius:"var(--r)",fontSize:13,cursor:"pointer",color:"var(--err)"}}>
              <i className="ti ti-trash"/>
            </button>
          )}
        </div>
      </div>

      <div style={S.body}>
        {(trips.length>0||kuutens.length>0)&&(
          <div style={{...S.card,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:kuutens.length>0?6:0}}>
              <span style={{fontSize:13,color:"var(--txt2)"}}>乗車合計</span>
              <span style={{fontSize:20,fontWeight:500}}>¥{total.toLocaleString()}</span>
            </div>
            {kuutens.length>0&&(
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:6,borderTop:"0.5px solid var(--bdr)"}}>
                <span style={{fontSize:12,color:"var(--err)"}}>空転合計（控除）</span>
                <span style={{fontSize:15,fontWeight:500,color:"var(--err)"}}>−¥{kuutenTotal.toLocaleString()}</span>
              </div>
            )}
          </div>
        )}

        {trips.length===0&&kuutens.length===0&&(
          <div style={{textAlign:"center",color:"var(--txt3)",fontSize:14,padding:"60px 20px",lineHeight:2.4}}>
            まだ記録がありません<br/>右下の ＋ から乗車記録を追加
          </div>
        )}

        {trips.map((t,i)=>(
          <div key={t.id} style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:11,color:"var(--txt3)",margin:"0 0 2px"}}>
                  #{i+1}　{t.pTime}{t.dTime?` → ${t.dTime}`:""}{t.jitsu?` (${t.jitsu})`:""}
                  {FORM_ID&&<span style={{marginLeft:6,color:t.synced?"var(--ok)":"var(--warn)"}}>{t.synced?"●":"○"}</span>}
                </p>
                <p style={{fontSize:14,fontWeight:500,margin:"0 0 4px",lineHeight:1.5}}>
                  <span style={{color:"var(--txt2)"}}>{t.pWard||"—"}</span>{t.pArea}
                  {t.pLat&&<i className="ti ti-map-pin" style={{fontSize:10,color:"var(--ok)",marginLeft:3}}/>}
                  <span style={{color:"var(--txt3)",margin:"0 5px"}}>→</span>
                  <span style={{color:"var(--txt2)"}}>{t.dWard||"—"}</span>{t.dArea}
                  {t.dLat&&<i className="ti ti-map-pin" style={{fontSize:10,color:"var(--ok)",marginLeft:3}}/>}
                </p>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,border:"0.5px solid var(--bdr)",color:PAY_CLR[t.pay]||"var(--txt2)"}}>{t.pay}</span>
                  {t.pay==="イースタン"&&t.easternName&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:10,border:"0.5px solid var(--bdr)",color:"var(--warn)"}}>{t.easternName}</span>}
                  {t.yuusen&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:10,border:"0.5px solid var(--warn-bd)",color:"var(--warn)",background:"var(--warn-bg)"}}>優先パス</span>}
                  {t.stat!=="GO"&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:10,border:"0.5px solid var(--bdr)",color:"var(--txt3)"}}>{t.stat}</span>}
                  {t.acc!=="専用"&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:10,border:"0.5px solid var(--bdr)",color:"var(--txt3)"}}>{t.acc}</span>}
                  {t.sankyu!=="通常"&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:10,border:"0.5px solid var(--bdr)",color:"var(--warn)"}}>{t.sankyu}</span>}
                  {t.kotei!=="N"&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:10,border:"0.5px solid var(--bdr)",color:"var(--info)"}}>{t.kotei}({KOTEI_LABELS[t.kotei]})</span>}
                </div>
                {t.memo&&<p style={{fontSize:12,color:"var(--txt3)",margin:"4px 0 0",lineHeight:1.4}}>{t.memo}</p>}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <p style={{fontSize:18,fontWeight:500,margin:"0 0 4px"}}>¥{t.fare.toLocaleString()}</p>
                <div style={{display:"flex",gap:0,justifyContent:"flex-end"}}>
                  <button onClick={()=>{resetTripForm(t);setScreen("form");}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--txt3)",fontSize:15,padding:"3px 5px"}}><i className="ti ti-edit"/></button>
                  <button onClick={()=>setTrips(ts=>ts.filter(x=>x.id!==t.id))} style={{background:"none",border:"none",cursor:"pointer",color:"var(--txt3)",fontSize:15,padding:"3px 5px"}}><i className="ti ti-trash"/></button>
                </div>
              </div>
            </div>
          </div>
        ))}

        {kuutens.map(k=>(
          <div key={k.id} style={{...S.card,border:"0.5px solid var(--err-bd)",background:"var(--err-bg)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1}}>
                <p style={{fontSize:11,color:"var(--err)",margin:"0 0 2px",fontWeight:500}}>
                  空転 {k.kType==="A"?"【迎車キャンセル】":"【メーター空転】"}　{k.time}
                </p>
                <p style={{fontSize:14,color:"var(--txt)",margin:"0 0 2px"}}>
                  <span style={{color:"var(--txt2)"}}>{k.ward||"—"}</span>{k.area}
                  {k.lat&&<i className="ti ti-map-pin" style={{fontSize:10,color:"var(--ok)",marginLeft:3}}/>}
                </p>
                {k.memo&&<p style={{fontSize:12,color:"var(--txt3)",margin:"2px 0 0"}}>{k.memo}</p>}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <p style={{fontSize:18,fontWeight:500,color:"var(--err)",margin:"0 0 4px"}}>−¥{k.fare.toLocaleString()}</p>
                <button onClick={()=>setKuutens(ks=>ks.filter(x=>x.id!==k.id))} style={{background:"none",border:"none",cursor:"pointer",color:"var(--err)",fontSize:15,padding:"3px 5px"}}><i className="ti ti-trash"/></button>
              </div>
            </div>
          </div>
        ))}
      </div>

      <button onClick={()=>{resetKuutenForm();setScreen("kuuten");}} style={S.fab2}>
        <i className="ti ti-alert-triangle" style={{fontSize:14}}/>空転を記録
      </button>
      <button onClick={()=>{resetTripForm();setScreen("form");}} style={S.fab}>
        <i className="ti ti-plus"/>
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
