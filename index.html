/* ── エリア名から読みを取得 ── */
function getReading(area){
  const base=area.replace(/[〇一二三四五六七八九十百]+丁目$/,"").replace(/\d+丁目$/,"");
  return FURIGANA[base]||FURIGANA[area]||"";
}

/* ── エリア名が検索クエリにマッチするか ── */
function matchArea(area,q){
  if(!q)return true;
  if(area.includes(q))return true;
  const reading=getReading(area);
  return reading.includes(q);
}

/* ── 丁目を含むエリアを正しくソート ── */
const KANJI_NUM={"〇":0,"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9,"十":10};
function chomeNum(s){
  const m=s.match(/([〇一二三四五六七八九十]+)丁目/);
  if(!m)return -1;
  let n=0;for(const c of m[1])n=n*10+(KANJI_NUM[c]||0);
  return n;
}
function sortAreas(arr){
  return [...arr].sort((a,b)=>{
    const ba=a.replace(/[〇一二三四五六七八九十]+丁目$/,"");
    const bb=b.replace(/[〇一二三四五六七八九十]+丁目$/,"");
    if(ba!==bb)return ba.localeCompare(bb,"ja");
    const na=chomeNum(a),nb=chomeNum(b);
    if(na>=0&&nb>=0)return na-nb;
    return 0;
  });
}

/* ── 時刻・日付（16時シフト対応）── */
function getShiftNow(){
  const d=new Date(), h=d.getHours();
  return `${pad2(h < SHIFT_START_HOUR ? h+24 : h)}:${pad2(d.getMinutes())}`;
}
function getShiftDate(){
  const d=new Date();
  if(d.getHours() < SHIFT_START_HOUR) d.setDate(d.getDate()-1);
  return `${d.getFullYear()}/${pad2(d.getMonth()+1)}/${pad2(d.getDate())}`;
}
const getDow = s=>{
  if(!s)return"";
  const d=new Date(s.replace(/\//g,"-"));
  return isNaN(d)?"":DOW_JP[d.getDay()]||"";
};

/* ── 実車時間計算 ── */
function calcJitsu(p,d){
  const toM=t=>{if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+(m||0);};
  const pm=toM(p),dm=toM(d);
  if(pm==null||dm==null)return"";
  let diff=dm-pm; if(diff<0)diff+=24*60;
  return `${Math.floor(diff/60)}:${pad2(diff%60)}`;
}

/* ── 住所パース ── */
function parseAddr(addr){
  if(!addr)return{ward:"その他",area:""};
  const m=addr.match(/^(.+?[区市郡])(.+)$/);
  return m?{ward:m[1],area:m[2]}:{ward:"その他",area:addr};
}

/* ── 料金フォーマット ── */
function fmtFare(n){
  const v=parseInt(String(n).replace(/[^0-9]/g,""));
  return isNaN(v)?"":"¥"+v.toLocaleString();
}

/* ── Haversine距離（km）── */
function haversine(lat1,lon1,lat2,lon2){
  const R=6371, toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1), dLon=toR(lon2-lon1);
  const a=Math.sin(dLat/2)**2 +
          Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ── DBから緯度・経度を読む（列名不問・東京圏の値範囲で自動検出）── */
function extractLatLng(row){
  /* まず列名で探す */
  const lat0=parseFloat(row["緯度"]||row["lat"]||row["latitude"]||row["Lat"]||row["LAT"]||"");
  const lng0=parseFloat(row["経度"]||row["lng"]||row["longitude"]||row["Lng"]||row["LON"]||row["lon"]||"");
  if(!isNaN(lat0)&&!isNaN(lng0))return{lat:lat0,lng:lng0};
  /* 列名が違う場合：値の範囲で判定（緯度34〜36、経度138〜141）*/
  const nums=Object.values(row).map(v=>parseFloat(v)).filter(v=>!isNaN(v));
  const lat=nums.find(v=>v>=34&&v<=36);
  const lng=nums.find(v=>v>=138&&v<=141);
  return(lat&&lng)?{lat,lng}:null;
}

/* ── GPS：最寄り地点を検索 ── */
function findNearest(lat,lng,locList){
  let best=null, bestDist=Infinity;
  for(const loc of locList){
    if(!loc.lat||!loc.lng)continue;
    const d=haversine(lat,lng,loc.lat,loc.lng);
    if(d<bestDist){bestDist=d;best=loc;}
  }
  return best ? {...best, distM:Math.round(bestDist*1000)} : null;
}

/* ── GPS取得 Promise ── */
function getGPS(timeoutMs=8000){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject(new Error("GPS非対応"));return;}
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy)}),
      e=>reject(new Error(e.code===1?"位置情報の許可が必要です":e.code===2?"GPS取得失敗":"タイムアウト")),
      {enableHighAccuracy:true,timeout:timeoutMs,maximumAge:0}
    );
  });
}

    try{return JSON.parse(localStorage.getItem(NIPPOU_START_KEY)||"null")||{shukkin:"",musen:"",taxi:"JAP",kurotaku:"青",deban:"J",rank01:"",rank02:""};}
    catch{return{shukkin:"",musen:"",taxi:"JAP",kurotaku:"青",deban:"J",rank01:"",rank02:""};}
  });
  const setSF=(f,v)=>setShukkinForm(s=>({...s,[f]:v}));
  const [showRank02,setShowRank02]=useState(false);
  /* シフトメモ */
  const [shiftMemo,setShiftMemo]=useState(()=>localStorage.getItem("eimu_shift_memo")||"");
  const [showMemo,setShowMemo]=useState(false);
  const [fpCapturing,setFpCapturing]=useState(false); /* 乗車一括取得中 */
  const [fdCapturing,setFdCapturing]=useState(false); /* 降車一括取得中 */
  /* 休憩手動入力用 */
  const [manualBS,setManualBS]=useState("");
  const [manualBE,setManualBE]=useState("");
  /* 休憩管理 */
  const [breaks,setBreaks]=useState(()=>{try{return JSON.parse(localStorage.getItem(BREAK_STORE_KEY)||"[]");}catch{return[];}});
  const [breakStart,setBreakStart]=useState(()=>localStorage.getItem("eimu_break_start")||null);
  const [breakStartTs,setBreakStartTs]=useState(()=>{const v=localStorage.getItem("eimu_break_ts");return v?parseInt(v):null;});
  const [elapsed,setElapsed]=useState(()=>{const v=localStorage.getItem("eimu_break_ts");return v?Math.floor((Date.now()-parseInt(v))/1000):0;});
  const [sendResult,setSendResult]=useState(null);

  /* ── 乗車記録フォーム ── */
  const [formDate,setFormDate]=useState(getShiftDate());
  const [fp,setFp]=useState(""); const [fd,setFd]=useState("");
  const [fpWard,setFpWard]=useState(""); const [fpArea,setFpArea]=useState("");
  const [fpLat,setFpLat]=useState(null); const [fpLng,setFpLng]=useState(null);
  const [fdWard,setFdWard]=useState(""); const [fdArea,setFdArea]=useState("");
  const [fdLat,setFdLat]=useState(null); const [fdLng,setFdLng]=useState(null);
  const [fare,setFare]=useState("");
  const [pay,setPay]=useState("GO Pay");
  const [acc,setAcc]=useState("専用");
  const [stat,setStat]=useState("GO");
  const [sankyu,setSankyu]=useState("通常");
  const [kotei,setKotei]=useState("N");
  const [yuusen,setYuusen]=useState(false);
  const [easternName,setEasternName]=useState("");
  const [memo,setMemo]=useState("");
  const [custType,setCustType]=useState("日本人"); /* 客種別 */

  /* ── 空転フォーム ── */
  const [kType,setKType]=useState("A");
  const [kTime,setKTime]=useState("");
  const [kWard,setKWard]=useState(""); const [kArea,setKArea]=useState("");
  const [kLat,setKLat]=useState(null); const [kLng,setKLng]=useState(null);
  const [kFare,setKFare]=useState("500");
  const [kMemo,setKMemo]=useState("");

  /* ── 住所ピッカー ── */
  const [pickerFor,setPickerFor]=useState(null); // "p"|"d"|"k"
  const [pickWard,setPickWard]=useState("");
  const [areaQ,setAreaQ]=useState("");
  const [gpsState,setGpsState]=useState("idle"); // idle|loading|ok|err
  const [gpsMsg,setGpsMsg]=useState("");

  /* ── persist ── */
  useEffect(()=>{try{localStorage.setItem(STORE_KEY,JSON.stringify(trips));}catch{}},[trips]);
  useEffect(()=>{try{localStorage.setItem(KUUTEN_KEY,JSON.stringify(kuutens));}catch{}},[kuutens]);
  useEffect(()=>{try{localStorage.setItem(BREAK_STORE_KEY,JSON.stringify(breaks));}catch{}},[breaks]);

  /* フォーム下書き自動保存（フォーム画面中に何か入力があれば保存）*/
  useEffect(()=>{
    if(screen!=="form")return;
    if(!fp&&!fare&&!fpWard)return; /* 空フォームは保存しない */
    const d={editId,formDate,fp,fd,fpWard,fpArea,fpLat,fpLng,
             fdWard,fdArea,fdLat,fdLng,fare,pay,acc,stat,
             sankyu,kotei,yuusen,easternName,memo};
    localStorage.setItem("eimu_form_draft",JSON.stringify(d));
    setHasDraft(true);
  },[screen,fp,fare,fpWard,fpArea,fdWard,fdArea,fd,formDate,
     fpLat,fpLng,fdLat,fdLng,pay,acc,stat,sankyu,kotei,yuusen,easternName,memo,editId]);

  /* 休憩タイマー */
  useEffect(()=>{
    if(!breakStartTs){setElapsed(0);return;}
    const iv=setInterval(()=>setElapsed(Math.floor((Date.now()-breakStartTs)/1000)),1000);
    return()=>clearInterval(iv);
  },[breakStartTs]);

  /* ── 住所DB読み込み（lat/lng も取得）── */
  useEffect(()=>{
    Papa.parse(LOC_CSV,{
      download:true,header:true,skipEmptyLines:true,
      complete:({data})=>{
        const db={};const list=[];let n=0;
        data.forEach(row=>{
          const name=row["住所名"]||row["名称"]||row["場所名"]||
                     Object.values(row).find(v=>v&&isNaN(v))||"";
          if(!name.trim())return;
          const{ward,area}=parseAddr(name.trim());
          const coords=extractLatLng(row);
          if(!db[ward])db[ward]=new Set();
          db[ward].add(area);
          list.push({ward,area,name:name.trim(),
                     lat:coords?.lat||null, lng:coords?.lng||null});
          n++;
        });
        const res={};
        Object.keys(db).sort().forEach(k=>{res[k]=sortAreas(Array.from(db[k]));});
        setLocDB(res); setWards(Object.keys(res));
        setLocList(list); setLocN(n); setLocLoad(false);
      },
      error:()=>setLocLoad(false)
    });
  },[]);

  const pickerAreas=useMemo(()=>{
    if(!areaQ)return locDB[pickWard]||[];
    if(pickWard){
      /* 市区選択済み：その市区内でひらがな・漢字マッチ */
      return(locDB[pickWard]||[]).filter(a=>matchArea(a,areaQ));
    }else{
      /* 市区未選択：全エリア横断検索 → {ward,area}の配列 */
      const results=[];
      for(const [w,areas] of Object.entries(locDB)){
        for(const a of areas){
          if(matchArea(a,areaQ))results.push({ward:w,area:a});
        }
      }
      return results.slice(0,30);
    }
  },[locDB,pickWard,areaQ]);

  /* ── 住所ピッカーを開く ── */
  const openPicker=f=>{
    setPickerFor(f);
    setPickWard("");
    setAreaQ(""); setGpsState("idle"); setGpsMsg("");
  };

  /* ── リストから住所を選択 ── */
  const pickArea=(a,ward)=>{
    const w=ward||pickWard;
    if(pickerFor==="p"){setFpWard(w);setFpArea(a);setFpLat(null);setFpLng(null);}
    else if(pickerFor==="d"){setFdWard(w);setFdArea(a);setFdLat(null);setFdLng(null);}
    else{setKWard(w);setKArea(a);setKLat(null);setKLng(null);}
    /* 履歴に保存 */
    const entry={ward:w,area:a};
    const newHist=[entry,...locHistory.filter(h=>!(h.ward===w&&h.area===a))].slice(0,8);
    setLocHistory(newHist);
    try{localStorage.setItem(HISTORY_KEY,JSON.stringify(newHist));}catch{}
    setPickerFor(null);
  };

  /* ── GPSで現在地を取得して最寄り住所をセット ── */
  const handleGPS=useCallback(async()=>{
    setGpsState("loading"); setGpsMsg("GPS取得中…");
    try{
      const {lat,lng,acc}=await getGPS();
      setGpsMsg(`精度 ±${acc}m で取得中…`);
      const nearest=findNearest(lat,lng,locList.filter(l=>l.lat));
      if(!nearest){setGpsState("err");setGpsMsg("近くの住所が見つかりませんでした");return;}
      /* 確認メッセージ */
      setGpsMsg(`📍 ${nearest.ward}${nearest.area}（約${nearest.distM}m）`);
      setGpsState("ok");
      /* セット */
      if(pickerFor==="p"){
        setFpWard(nearest.ward);setFpArea(nearest.area);
        setFpLat(lat);setFpLng(lng);
      }else if(pickerFor==="d"){
        setFdWard(nearest.ward);setFdArea(nearest.area);
        setFdLat(lat);setFdLng(lng);
      }else{
        setKWard(nearest.ward);setKArea(nearest.area);
        setKLat(lat);setKLng(lng);
      }
      /* 少し待ってから閉じる */
      setTimeout(()=>setPickerFor(null),1200);
    }catch(e){
      setGpsState("err");setGpsMsg(e.message||"GPS取得に失敗しました");
    }
  },[locList,pickerFor]);

  const jitsu=useMemo(()=>calcJitsu(fp,fd),[fp,fd]);

  /* ── フォームリセット ── */
  const resetTripForm=(t=null)=>{
    setEditId(t?t.id:null);
    setFormDate(t?t.date:getShiftDate());
    setFp(t?t.pTime:""); setFd(t?t.dTime:"");
    setFpWard(t?t.pWard:""); setFpArea(t?t.pArea:"");
    setFpLat(t?t.pLat:null); setFpLng(t?t.pLng:null);
    setFdWard(t?t.dWard:""); setFdArea(t?t.dArea:"");
    setFdLat(t?t.dLat:null); setFdLng(t?t.dLng:null);
    setFare(t?String(t.fare):"");
    setPay(t?t.pay:"GO Pay"); setAcc(t?t.acc:"専用");
    setStat(t?t.stat:"GO"); setSankyu(t?t.sankyu:"通常");
    setKotei(t?t.kotei:"N"); setYuusen(t?t.yuusen:false);
    setEasternName(t?t.easternName||"":"");
    setMemo(t?t.memo||"":"");
    setCustType(t?t.custType||"日本人":"日本人");
  };
  const resetKuutenForm=()=>{
    setKType("A");setKTime("");
    setKWard("");setKArea("");setKLat(null);setKLng(null);
    setKFare("500");setKMemo("");
  };

  /* ── 保存 ── */
  const saveTrip=async()=>{
    if(!fare||!fp||!fd||!fpWard||!fdWard)return;
    const isEdit=!!editId;
    const origTrip=isEdit?trips.find(t=>t.id===editId):null;
    const origSynced=origTrip?.synced||false;
    const trip={
      id:editId||Date.now(), date:formDate, dow:getDow(formDate),
      pTime:fp, dTime:fd, jitsu,
      pWard:fpWard, pArea:fpArea, pLat:fpLat, pLng:fpLng,
      dWard:fdWard, dArea:fdArea, dLat:fdLat, dLng:fdLng,
      fare:parseInt(fare.replace(/[^0-9]/g,""))||0,
      pay, acc, stat, sankyu, kotei, yuusen,
      easternName:pay==="イースタン"?easternName:"",
      memo, custType, synced:origSynced,
      needsFix:origTrip?.needsFix||false,
      fixNote:origTrip?.fixNote||"",
    };

    /* 編集時：変更箇所を自動検出して修正履歴をメモに追記 */
    if(isEdit&&origTrip){
      const chg=[];
      const fmtLoc=(w,a)=>w?(w+(a||"")):"—";
      if(origTrip.fare!==trip.fare)
        chg.push(`料金: ${fmtFare(origTrip.fare)} → ${fmtFare(trip.fare)}`);
      if(origTrip.pTime!==trip.pTime)
        chg.push(`乗車時間: ${origTrip.pTime} → ${trip.pTime}`);
      if(origTrip.dTime!==trip.dTime)
        chg.push(`降車時間: ${origTrip.dTime} → ${trip.dTime}`);
      if(origTrip.pWard!==trip.pWard||origTrip.pArea!==trip.pArea)
        chg.push(`乗車地: ${fmtLoc(origTrip.pWard,origTrip.pArea)} → ${fmtLoc(trip.pWard,trip.pArea)}`);
      if(origTrip.dWard!==trip.dWard||origTrip.dArea!==trip.dArea)
        chg.push(`降車地: ${fmtLoc(origTrip.dWard,origTrip.dArea)} → ${fmtLoc(trip.dWard,trip.dArea)}`);
      if(origTrip.pay!==trip.pay)
        chg.push(`支払: ${origTrip.pay} → ${trip.pay}`);
      if(origTrip.acc!==trip.acc)
        chg.push(`アカウント: ${origTrip.acc} → ${trip.acc}`);
      if(origTrip.stat!==trip.stat)
        chg.push(`ステータス: ${origTrip.stat} → ${trip.stat}`);
      if(origTrip.sankyu!==trip.sankyu)
        chg.push(`サンキュー: ${origTrip.sankyu} → ${trip.sankyu}`);
      if(origTrip.kotei!==trip.kotei)
        chg.push(`固定: ${origTrip.kotei} → ${trip.kotei}`);
      if((origTrip.yuusen||false)!==(trip.yuusen||false))
        chg.push(`優先パス: ${origTrip.yuusen?"ON":"OFF"} → ${trip.yuusen?"ON":"OFF"}`);

      if(chg.length>0){
        const entry=`[${getShiftNow()}] ${chg.join(" / ")}`;
        trip.fixNote=(trip.fixNote?trip.fixNote+"\n":"")+entry;
        trip.needsFix=true; /* 変更があれば自動フラグ */
      }
    }

    /* 新規のみGoogleフォームに送信。編集はローカル更新のみ */
    if(FORM_ID&&!isEdit){
      setSending(true);
      const ok=await submitToForm(trip);
      trip.synced=ok;
      setSendResult(ok?"ok":"err");
      setTimeout(()=>setSendResult(null),3000);
      setSending(false);
    }
    setTrips(ts=>isEdit?ts.map(t=>t.id===editId?trip:t):[...ts,trip]);
    clearDraft();
    setScreen("log");
  };

  const saveKuuten=async()=>{    const k={
      id:Date.now(), date:getShiftDate(),
      kType, time:kTime, ward:kWard, area:kArea,
      lat:kLat, lng:kLng,
      fare:parseInt(kFare)||0, memo:kMemo,
      synced:false,
    };
    const ok=await submitKuutenToForm(k);
    k.synced=ok;
    setKuutens(ks=>[...ks,k]);
    resetKuutenForm(); setScreen("log");
  };

  /* ── 休憩開始 ── */
  const startBreak=()=>{
    const now=getShiftNow();
    const ts=Date.now();
    setBreakStart(now); setBreakStartTs(ts); setElapsed(0);
    localStorage.setItem("eimu_break_start",now);
    localStorage.setItem("eimu_break_ts",String(ts));
  };

  /* ── 休憩終了 ── */
  const endBreak=async()=>{
    if(!breakStart)return;
    const endTime=getShiftNow();
    const toM=t=>{const[h,m]=t.split(":").map(Number);return h*60+m;};
    let diff=toM(endTime)-toM(breakStart);
    if(diff<0)diff+=24*60;
    const minutes=Math.round(diff);
    const rec={id:Date.now(),date:getShiftDate(),startTime:breakStart,endTime,minutes,memo:"",synced:false};
    const ok=await submitBreakToForm(rec);
    rec.synced=ok;
    setBreaks(bs=>[...bs,rec]);
    setBreakStart(null); setBreakStartTs(null); setElapsed(0);
    localStorage.removeItem("eimu_break_start");
    localStorage.removeItem("eimu_break_ts");
  };

  /* ── 休憩手動保存 ── */
  const saveManualBreak=async()=>{
    if(!manualBS||!manualBE)return;
    const toM=t=>{const[h,m]=t.split(":").map(Number);return h*60+m;};
    let diff=toM(manualBE)-toM(manualBS);
    if(diff<0)diff+=24*60;
    const minutes=Math.round(diff);
    if(minutes<=0)return;
    const rec={id:Date.now(),date:getShiftDate(),startTime:manualBS,endTime:manualBE,minutes,memo:"（手動入力）",synced:false};
    const ok=await submitBreakToForm(rec);
    rec.synced=ok;
    setBreaks(bs=>[...bs,rec]);
    setManualBS(""); setManualBE("");
    setScreen("log");
  };

  /* ── 下書き復元 ── */
  const restoreDraft=()=>{
    try{
      const d=JSON.parse(localStorage.getItem("eimu_form_draft")||"{}");
      setEditId(d.editId||null);
      setFormDate(d.formDate||getShiftDate());
      setFp(d.fp||""); setFd(d.fd||"");
      setFpWard(d.fpWard||""); setFpArea(d.fpArea||"");
      setFpLat(d.fpLat||null); setFpLng(d.fpLng||null);
      setFdWard(d.fdWard||""); setFdArea(d.fdArea||"");
      setFdLat(d.fdLat||null); setFdLng(d.fdLng||null);
      setFare(d.fare||""); setPay(d.pay||"GO Pay");
      setAcc(d.acc||"専用"); setStat(d.stat||"GO");
      setSankyu(d.sankyu||"通常"); setKotei(d.kotei||"N");
      setYuusen(d.yuusen||false);
      setEasternName(d.easternName||""); setMemo(d.memo||"");
      setScreen("form");
    }catch{}
  };
  const clearDraft=()=>{
    localStorage.removeItem("eimu_form_draft");
    setHasDraft(false);
  };

  /* ── 出勤記録を保存 ── */
  const saveShukkin=()=>{
    try{localStorage.setItem(NIPPOU_START_KEY,JSON.stringify(shukkinForm));}catch{}
    setScreen("log");
  };

  /* ── 乗車時刻・現在地を一括取得 ── */
  const capturePickup=async()=>{
    setFp(getShiftNow());
    setFpCapturing(true);
    try{
      const{lat,lng}=await getGPS();
      const nearest=findNearest(lat,lng,locList.filter(l=>l.lat));
      if(nearest){setFpWard(nearest.ward);setFpArea(nearest.area);setFpLat(lat);setFpLng(lng);}
    }catch{}
    finally{setFpCapturing(false);}
  };

  /* ── 降車時刻・現在地を一括取得 ── */
  const captureDropoff=async()=>{
    setFd(getShiftNow());
    setFdCapturing(true);
    try{
      const{lat,lng}=await getGPS();
      const nearest=findNearest(lat,lng,locList.filter(l=>l.lat));
      if(nearest){setFdWard(nearest.ward);setFdArea(nearest.area);setFdLat(lat);setFdLng(lng);}
    }catch{}
    finally{setFdCapturing(false);}
  };

  /* ── シフトメモ自動保存 ── */
  useEffect(()=>{localStorage.setItem("eimu_shift_memo",shiftMemo);},[shiftMemo]);

  const insertTime=()=>{
    const ts=`[${getShiftNow()}] `;
    setShiftMemo(m=>m+(m&&!m.endsWith("\n")?"\n":"")+ts);
  };
  const saveRank02=(val)=>{
    const updated={...shukkinForm,rank02:val};
    setShukkinForm(updated);
    try{localStorage.setItem(NIPPOU_START_KEY,JSON.stringify(updated));}catch{}
    setShowRank02(false);
  };

  /* ── 日報スキャン（AI読み取り）── */
  const scanNippou=async(imgData,imgType)=>{
    setNippouScreen("scanning"); setNScanError("");
    /* 出勤記録から引き継ぎ */
    const saved=(() => {try{return JSON.parse(localStorage.getItem(NIPPOU_START_KEY)||"null");}catch{return null;}})();
    if(saved)setNippouForm(f=>({...f,
      shukkin:saved.shukkin||f.shukkin, musen:saved.musen||f.musen,
      taxi:saved.taxi||f.taxi, kurotaku:saved.kurotaku||f.kurotaku,
      deban:saved.deban||f.deban, rank01:saved.rank01||f.rank01,
      rank02:saved.rank02||f.rank02,
    }));
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1000,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:imgType,data:imgData}},
            {type:"text",text:SCAN_PROMPT}
          ]}]
        })
      });
      const json=await res.json();
      const text=json.content.map(i=>i.text||"").join("");
      const p=JSON.parse(text.replace(/```json|```/g,"").trim());
      setNippouForm(f=>({...f,
        date:p["日付"]||"",dow:p["曜日"]||"",nokin:p["納金額"]||"",
        eishu:p["営収"]||"",kaisu:p["回数"]||"",handle:p["ハンドル時間"]||"",
        kyukei:p["休憩時間"]||"",zensokou:p["全走行距離"]||"",
        jissha:p["実車走行距離"]||"",
        musen:p["無線番号"]||f.musen, /* 出勤記録があれば上書きしない */
      }));
      setNippouScreen("form");
    }catch{
      setNScanError("読み取りに失敗しました。もう一度お試しください。");
      setNippouScreen("idle");
    }
  };

  const saveNippou=async()=>{
    setNippouSending(true);
    const ok=await submitNippouToForm(nippouForm);
    setNippouSending(false);
    if(ok){setNippouScreen("idle");setScreen("log");}
    else alert("送信に失敗しました");
  };

  /* ── CSV エクスポート ── */
  const doExport=()=>{
    const h="日付,曜日,乗車時間,降車時間,実車時間,乗車地：市区,乗車地：地名,乗車地：緯度,乗車地：経度,降車地：市区,降車地：地名,降車地：緯度,降車地：経度,料金,アカウント,ステータス,支払,サンキュー,固定客,優先パス,イースタン氏名,メモ";
    const rows=trips.map(t=>[
      t.date,t.dow,t.pTime,t.dTime,t.jitsu,
      t.pWard,t.pArea,t.pLat||"",t.pLng||"",
      t.dWard,t.dArea,t.dLat||"",t.dLng||"",
      fmtFare(t.fare),t.acc,t.stat,t.pay,t.sankyu,t.kotei,
      t.yuusen?"優":"",t.easternName||"",t.memo||""
    ].join(",")).join("\n");
    let out=h+"\n"+rows;
    if(kuutens.length>0){
      out+="\n\n--- 空転記録 ---\n日付,種別,時刻,市区,地名,緯度,経度,金額,メモ\n";
      out+=kuutens.map(k=>[

  const total=trips.reduce((s,t)=>s+t.fare,0);

      txt+=`③ カード　　¥${grouped.card.total.toLocaleString()}　${grouped.card.count}件\n`;

        <div style={S.body}>
          <p style={{fontSize:12,color:"var(--txt3)",margin:"0 0 12px",padding:"8px 12px",background:"var(--bg2)",borderRadius:"var(--r)"}}>
            押し忘れや画面が閉じた場合など、時刻を直接入力して記録できます
          </p>

          <div style={S.card}>
            <label style={S.lbl}>開始時刻（深夜は25:xx形式も可）</label>
            <TimeRow label="" val={manualBS} set={setManualBS}/>
          </div>

          <div style={S.card}>
            <label style={S.lbl}>終了時刻</label>
            <TimeRow label="" val={manualBE} set={setManualBE}/>
            {previewMins!=null&&previewMins>0&&(
              <p style={{fontSize:13,color:"var(--ok)",marginTop:6}}>
                → {previewMins}分の休憩
              </p>
            )}
          </div>

          <button onClick={saveManualBreak}
            disabled={!manualBS||!manualBE||previewMins<=0}
            style={{width:"100%",padding:14,background:"var(--ok-bg)",border:"0.5px solid var(--ok-bd)",borderRadius:"var(--rl)",fontSize:16,fontWeight:500,cursor:"pointer",color:"var(--ok)",marginTop:4,opacity:(!manualBS||!manualBE||previewMins<=0)?0.4:1}}>
            保存する
          </button>
          <button onClick={()=>setScreen("log")} style={{width:"100%",padding:12,background:"none",border:"none",fontSize:14,cursor:"pointer",color:"var(--txt2)",marginTop:4}}>
            キャンセル
          </button>
        </div>
      </div>
    );
  }

  /* ════════════════════════════════
     住所ピッカー画面
  ════════════════════════════════ */
  if(pickerFor) return (
    <div style={S.wrap}>
      <div style={{...S.hdr,gap:10}}>
        <button onClick={()=>setPickerFor(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--txt)",lineHeight:1}}>‹</button>
        <span style={{fontSize:15,fontWeight:500}}>
          {pickerFor==="p"?"乗車地":pickerFor==="d"?"降車地":"空転場所"}を選択
        </span>
        <span style={{fontSize:11,color:"var(--txt3)"}}>{locN>0?`${locN.toLocaleString()}件`:locLoad?"読込中…":""}</span>
      </div>

      {/* GPS ボタン */}
      <div style={{padding:"10px 12px",background:"var(--bg)",borderBottom:"0.5px solid var(--bdr)"}}>
        <button onClick={handleGPS} disabled={gpsState==="loading"} style={{
          width:"100%",padding:"11px",borderRadius:"var(--r)",cursor:"pointer",
          background:gpsState==="ok"?"var(--ok-bg)":gpsState==="err"?"var(--err-bg)":"var(--info-bg)",
          border:`0.5px solid ${gpsState==="ok"?"var(--ok-bd)":gpsState==="err"?"var(--err-bd)":"var(--info-bd)"}`,
          color:gpsState==="ok"?"var(--ok)":gpsState==="err"?"var(--err)":"var(--info)",
          display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          fontSize:14,fontWeight:500,
        }}>
          <i className={`ti ${gpsState==="loading"?"ti-loader-2":"ti-map-pin"}`}
             style={{fontSize:16,animation:gpsState==="loading"?"spin 1s linear infinite":""}}/>
          {gpsState==="idle"&&"現在地を使う（GPS）"}
          {gpsState==="loading"&&"取得中…"}
          {gpsState==="ok"&&gpsMsg}
          {gpsState==="err"&&gpsMsg}
        </button>
        {gpsState==="err"&&<p style={{fontSize:11,color:"var(--txt3)",marginTop:4,textAlign:"center"}}>下のリストから手動で選択できます</p>}
      </div>

      {/* ひらがな・漢字 横断検索ボックス */}
      <div style={{padding:"8px 12px",background:"var(--bg3)",borderBottom:"0.5px solid var(--bdr)"}}>
        <input value={areaQ} onChange={e=>{setAreaQ(e.target.value);if(e.target.value)setPickWard("");}}
          placeholder="ひらがな・漢字で検索（例：あかさか）"
          style={S.inp}/>
      </div>

      {/* 降車地・空転場所のみ：直接テキスト入力 */}
      {(pickerFor==="d"||pickerFor==="k")&&(
        <div style={{padding:"10px 12px",background:"var(--bg)",borderBottom:"0.5px solid var(--bdr)"}}>
          <label style={{fontSize:11,color:"var(--txt3)",display:"block",marginBottom:4}}>
            DB外の場所を直接入力（千葉市・西東京市など）
          </label>
          <div style={{display:"flex",gap:8}}>
            <input value={areaQ} onChange={e=>setAreaQ(e.target.value)}
              placeholder="例：西東京市田無町"
              style={{...S.inp,flex:1}}
              onKeyDown={e=>{
                if(e.key==="Enter"&&areaQ.trim()){
                  const{ward,area}=parseAddr(areaQ.trim());
                  pickArea(area||areaQ.trim(), ward);
                }
              }}
            />
            <button onClick={()=>{
              if(!areaQ.trim())return;
              const{ward,area}=parseAddr(areaQ.trim());
              pickArea(area||areaQ.trim(), ward);
            }} style={{
              padding:"0 14px",border:"0.5px solid var(--bdr2)",borderRadius:"var(--r)",
              background:"var(--bg2)",color:"var(--txt)",fontSize:13,cursor:"pointer",flexShrink:0
            }}>決定</button>
          </div>
        </div>
      )}

      {/* 最近使った場所 */}
      {locHistory.length>0&&!pickWard&&!areaQ&&(
        <div style={{background:"var(--bg)",borderBottom:"0.5px solid var(--bdr)",padding:"8px 14px"}}>
          <p style={{fontSize:11,color:"var(--txt3)",margin:"0 0 6px",fontWeight:500}}>最近使った場所</p>
          {locHistory.map((h,i)=>(
            <div key={i} onClick={()=>pickArea(h.area,h.ward)} style={{
              padding:"8px 2px",
              borderBottom:i<locHistory.length-1?"0.5px solid var(--bdr)":"none",
              fontSize:14,cursor:"pointer",display:"flex",gap:8,
            }}>
              <span style={{color:"var(--txt3)",fontSize:12,flexShrink:0,alignSelf:"center"}}>{h.ward}</span>
              <span style={{color:"var(--txt)"}}>{h.area}</span>
            </div>
          ))}
        </div>
      )}

      {/* 横断検索結果（市区未選択・検索あり）*/}
      {areaQ&&!pickWard&&(
        <div style={{flex:1,overflowY:"auto",padding:"0 14px 80px"}}>
          <p style={{fontSize:11,color:"var(--txt3)",padding:"8px 0 4px"}}>
            検索結果 {pickerAreas.length}件
          </p>
          {pickerAreas.length===0&&<p style={{color:"var(--txt3)",fontSize:13,padding:"8px 0"}}>該当なし</p>}
          {pickerAreas.map((item,i)=>(
            <div key={i} onClick={()=>pickArea(item.area,item.ward)} style={{
              padding:"11px 2px",borderBottom:"0.5px solid var(--bdr)",
              fontSize:15,cursor:"pointer",display:"flex",gap:10,alignItems:"center"
            }}>
              <span style={{color:"var(--txt3)",fontSize:12,flexShrink:0}}>{item.ward}</span>
              <span>{item.area}</span>
            </div>
          ))}
        </div>
      )}

      {/* 市区グループ選択 */}
      {!areaQ&&(
      <div style={{overflowY:"auto",flex:1}}>
        {/* 定義済みグループ */}
        {WARD_GROUPS.map(grp=>{
          const available=grp.wards.filter(w=>locDB[w]);
          if(available.length===0)return null;
          return(
            <div key={grp.label} style={{borderBottom:"0.5px solid var(--bdr)"}}>
              <p style={{fontSize:11,color:"var(--txt3)",padding:"6px 14px 4px",
                         background:"var(--bg3)",margin:0,fontWeight:500}}>{grp.label}</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"8px 12px"}}>
                {available.map(w=>(
                  <button key={w} onClick={()=>{setPickWard(w);setAreaQ("");}} style={{
                    padding:"7px 14px",borderRadius:20,cursor:"pointer",fontSize:14,
                    border:`0.5px solid ${pickWard===w?"var(--info)":"var(--bdr)"}`,
                    background:pickWard===w?"var(--info-bg)":"var(--bg)",
                    color:pickWard===w?"var(--info)":"var(--txt)",
                    fontWeight:pickWard===w?500:400,
                  }}>{w}</button>
                ))}
              </div>
            </div>
          );
        })}
        {/* その他（グループ外のward）*/}
        {(()=>{
          const defined=WARD_GROUPS.flatMap(g=>g.wards);
          const others=wards.filter(w=>!defined.includes(w)&&locDB[w]);
          if(others.length===0)return null;
          return(
            <div style={{borderBottom:"0.5px solid var(--bdr)"}}>
              <p style={{fontSize:11,color:"var(--txt3)",padding:"6px 14px 4px",
                         background:"var(--bg3)",margin:0,fontWeight:500}}>その他</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"8px 12px"}}>
                {others.map(w=>(
                  <button key={w} onClick={()=>{setPickWard(w);setAreaQ("");}} style={{
                    padding:"7px 14px",borderRadius:20,cursor:"pointer",fontSize:14,
                    border:`0.5px solid ${pickWard===w?"var(--info)":"var(--bdr)"}`,
                    background:pickWard===w?"var(--info-bg)":"var(--bg)",
                    color:pickWard===w?"var(--info)":"var(--txt)",
                    fontWeight:pickWard===w?500:400,
                  }}>{w}</button>
                ))}
              </div>
            </div>
          );
        })()}
      </div>
      )} {/* end !areaQ */}

      {/* 地名リスト（市区選択後）*/}
      {pickWard&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--bg3)",
                     zIndex:50,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
          <div style={{...S.hdr,gap:10}}>
            <button onClick={()=>setPickWard("")} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--txt)",lineHeight:1}}>‹</button>
            <span style={{fontSize:15,fontWeight:500}}>{pickWard}</span>
            <span style={{fontSize:11,color:"var(--txt3)"}}>{(locDB[pickWard]||[]).length}件</span>
          </div>
          <div style={{padding:"8px 12px",background:"var(--bg)",borderBottom:"0.5px solid var(--bdr)"}}>
            <input value={areaQ} onChange={e=>setAreaQ(e.target.value)}
              placeholder={`${pickWard}内を絞り込み…`} style={S.inp}/>
          </div>
          <div style={{overflowY:"auto",flex:1,padding:"0 14px 40px"}}>
            {pickerAreas.length===0&&<p style={{color:"var(--txt3)",fontSize:13,padding:"16px 0"}}>{locLoad?"読込中…":"該当なし"}</p>}
            {pickerAreas.map((a,i)=>(
              <div key={i} onClick={()=>pickArea(a)} style={{
                padding:"12px 2px",borderBottom:"0.5px solid var(--bdr)",
                fontSize:15,cursor:"pointer",userSelect:"none"
              }}>{a}</div>
            ))}
          </div>
        </div>
      )}

      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
      `}</style>
    </div>
  );

  /* ════════════════════════════════
     空転フォーム
  ════════════════════════════════ */
  if(screen==="kuuten") return (
    <div style={S.wrap}>
      <div style={{...S.hdr,gap:10}}>
        <button onClick={()=>setScreen("log")} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--txt)",lineHeight:1}}>‹</button>
        <p style={{fontSize:16,fontWeight:500,margin:0,color:"var(--err)"}}>空転を記録</p>
      </div>
      <div style={S.body}>
        <div style={S.card}>
          <label style={S.lbl}>空転の種別</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:4}}>
            {[["A","迎車キャンセル","予約が入ったがキャンセルに"],["B","メーター空転","連続配車中に客を発見しモードを抜けた"]].map(([t,name,desc])=>(
              <button key={t} onClick={()=>{setKType(t);setKFare("500");}} style={{
                padding:"10px 8px",borderRadius:"var(--r)",cursor:"pointer",textAlign:"left",
                border:`1.5px solid ${kType===t?"var(--err-bd)":"var(--bdr)"}`,
                background:kType===t?"var(--err-bg)":"var(--bg)",
              }}>
                <p style={{fontSize:13,fontWeight:500,color:kType===t?"var(--err)":"var(--txt)",margin:"0 0 2px"}}>{name}</p>
                <p style={{fontSize:11,color:"var(--txt3)",margin:0,lineHeight:1.4}}>{desc}</p>
              </button>
            ))}
          </div>
        </div>

        {kType==="A"&&(
          <div style={S.card}>
            <label style={S.lbl}>空転金額</label>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              {[["500","迎車のみ"],["1000","迎車＋予約"]].map(([v,l])=>(
                <button key={v} onClick={()=>setKFare(v)} style={{
                  flex:1,padding:"9px 8px",borderRadius:"var(--r)",cursor:"pointer",
                  border:`0.5px solid ${kFare===v?"var(--err-bd)":"var(--bdr)"}`,
                  background:kFare===v?"var(--err-bg)":"var(--bg)",
                  color:kFare===v?"var(--err)":"var(--txt2)",fontSize:13,
                }}>
                  <p style={{fontWeight:500,margin:"0 0 1px"}}>¥{parseInt(v).toLocaleString()}</p>
                  <p style={{fontSize:11,margin:0}}>{l}</p>
                </button>
              ))}
            </div>
            <input type="tel" value={kFare} onChange={e=>setKFare(e.target.value)}
              placeholder="金額" style={{...S.inp,fontFamily:"var(--mono)",textAlign:"right"}}/>
          </div>
        )}
        {kType==="B"&&(
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <label style={{...S.lbl,margin:0}}>空転金額</label>
              <span style={{fontSize:20,fontWeight:500,fontFamily:"var(--mono)"}}>¥500（固定）</span>
            </div>
          </div>
        )}

        <div style={S.card}>
          <label style={S.lbl}>空転時刻</label>
          <TimeRow label="" val={kTime} set={setKTime}/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>空転場所</label>
          <LocBtn ward={kWard} area={kArea} lat={kLat} lng={kLng} onClick={()=>openPicker("k")}/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>メモ</label>
          <textarea value={kMemo} onChange={e=>setKMemo(e.target.value)} rows={2}
            placeholder="備考など" style={{...S.inp,padding:"8px 10px",lineHeight:1.5}}/>
        </div>

        <button onClick={saveKuuten} style={{width:"100%",padding:14,background:"var(--err-bg)",border:"0.5px solid var(--err-bd)",borderRadius:"var(--rl)",fontSize:16,fontWeight:500,cursor:"pointer",color:"var(--err)",marginTop:4}}>
          空転を記録する
        </button>
        <button onClick={()=>setScreen("log")} style={{width:"100%",padding:12,background:"none",border:"none",fontSize:14,cursor:"pointer",color:"var(--txt2)",marginTop:4}}>キャンセル</button>
      </div>
    </div>
  );

  /* ════════════════════════════════
     乗車記録フォーム
  ════════════════════════════════ */
  if(screen==="form") return (
    <div style={S.wrap}>
      <div style={{...S.hdr,gap:10}}>
        <button onClick={()=>setScreen("log")} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--txt)",lineHeight:1}}>‹</button>
        <div>
          <p style={{fontSize:16,fontWeight:500,margin:0}}>{editId?"記録を編集":"新規乗車記録"}</p>
          {sendResult&&<p style={{fontSize:11,color:sendResult==="ok"?"var(--ok)":"var(--err)",margin:0}}>{sendResult==="ok"?"✓ 送信しました":"⚠ 送信に失敗（保存済）"}</p>}
        </div>
      </div>
      <div style={S.body}>

        {/* 日付 */}
        <div style={S.card}>
          <label style={S.lbl}>日付（自動：16時未満は前日扱い）</label>
          <input value={formDate} onChange={e=>setFormDate(e.target.value)} placeholder="YYYY/MM/DD" style={S.inp}/>
        </div>

        {/* ⚡ 乗車・降車ワンタップ取得（横並び）*/}
        {!editId&&(
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            {[
              {label:"乗車",cap:capturePickup,loading:fpCapturing,done:fp&&fpWard,time:fp,ward:fpWard,area:fpArea,
               bg:"var(--info-bg)",bd:"var(--info-bd)",cl:"var(--info)"},
              {label:"降車",cap:captureDropoff,loading:fdCapturing,done:fd&&fdWard,time:fd,ward:fdWard,area:fdArea,
               bg:"var(--warn-bg)",bd:"var(--warn-bd)",cl:"var(--warn)"},
            ].map(({label,cap,loading,done,time,ward,area,bg,bd,cl})=>(
              <button key={label} onClick={cap} disabled={loading} style={{
                flex:1,padding:"14px 8px",
                background:loading?"var(--bg2)":done?"var(--ok-bg)":bg,
                border:`1.5px solid ${loading?"var(--bdr)":done?"var(--ok-bd)":bd}`,
                borderRadius:"var(--rl)",cursor:loading?"default":"pointer",
                color:loading?"var(--txt3)":done?"var(--ok)":cl,
                display:"flex",flexDirection:"column",alignItems:"center",gap:5,
              }}>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:15,fontWeight:600}}>
                  <i className={`ti ${loading?"ti-loader-2":"ti-map-pin-bolt"}`}
                     style={{fontSize:18,animation:loading?"spin 1s linear infinite":""}}/>
                  {label}
                </div>
                <div style={{fontSize:11,textAlign:"center",lineHeight:1.4}}>
                  {loading?"取得中…":done?<>{time}<br/>{ward}{area}</>:"タップして取得"}
                </div>
              </button>
            ))}
          </div>
        )}

        {/* 乗車・降車 時刻＋場所（手動修正用）*/}
        <div style={S.card}>
          <div style={{marginBottom:12}}>
            <label style={{...S.lbl,color:"var(--info)"}}>乗車</label>
            <TimeRow label="時刻" val={fp} set={setFp}/>
            <LocBtn ward={fpWard} area={fpArea} lat={fpLat} lng={fpLng} onClick={()=>openPicker("p")}/>
          </div>
          <div style={{borderTop:"0.5px solid var(--bdr)",paddingTop:12}}>
            <label style={{...S.lbl,color:"var(--warn)"}}>降車</label>
            <TimeRow label="時刻" val={fd} set={setFd} jitsuLabel={jitsu}/>
            <LocBtn ward={fdWard} area={fdArea} lat={fdLat} lng={fdLng} onClick={()=>openPicker("d")}/>
          </div>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>料金（円）</label>
          <input type="tel" value={fare} onChange={e=>setFare(e.target.value)} placeholder="0"
            style={{...S.inp,fontSize:28,fontFamily:"var(--mono)",textAlign:"right",padding:"10px 12px"}}/>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>支払</label>
          <Chip opts={PAYMENT_OPTS} val={pay} onC={setPay} clrMap={PAY_CLR}/>
          {(pay==="イースタン"||pay==="その他")&&(
            <div style={{marginTop:10}}>
              <label style={{...S.lbl,color:"var(--warn)"}}>
                {pay==="イースタン"?"お客様氏名（イースタン報告用）":"支払い詳細メモ（任意）"}
              </label>
              <input value={easternName} onChange={e=>setEasternName(e.target.value)}
                placeholder={pay==="イースタン"?"例：山田 太郎":"例：〇〇会社チケット"}
                style={S.inp}/>
            </div>
          )}
        </div>

        <div style={S.card}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div><label style={S.lbl}>アカウント</label><Chip opts={ACCOUNT_OPTS} val={acc} onC={setAcc}/></div>
            <div><label style={S.lbl}>ステータス</label><Chip opts={STATUS_OPTS} val={stat} onC={setStat}/></div>
          </div>
        </div>

        <div style={S.card}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div><label style={S.lbl}>サンキュー</label><Chip opts={SANKYU_OPTS} val={sankyu} onC={setSankyu}/></div>
            <div>
              <label style={S.lbl}>固定（固定客）</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:4}}>
                {KOTEI_OPTS.map(o=>(
                  <button key={o} onClick={()=>setKotei(o)} style={{
                    padding:"6px 10px",borderRadius:20,fontSize:13,cursor:"pointer",
                    border:`0.5px solid ${kotei===o?"var(--info)":"var(--bdr)"}`,
                    background:kotei===o?"var(--bg2)":"var(--bg)",
                    color:kotei===o?"var(--info)":"var(--txt2)",fontWeight:kotei===o?500:400,
                  }}>
                    {o}<span style={{fontSize:10,marginLeft:3,opacity:.7}}>{KOTEI_LABELS[o]}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        <div style={S.card}>
          <Toggle on={yuusen} onToggle={()=>setYuusen(v=>!v)}
            label="優先パス" sub="該当する場合のみON（約20件に1回）" color="var(--warn)"/>
        </div>

        {/* 客種別 */}
        <div style={S.card}>
          <label style={S.lbl}>客種別</label>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            {["日本人","インバウンド"].map(t=>(
              <button key={t} onClick={()=>setCustType(t)} style={{
                flex:1,padding:"10px",borderRadius:"var(--r)",cursor:"pointer",fontSize:14,
                border:`0.5px solid ${custType===t?(t==="インバウンド"?"var(--warn-bd)":"var(--info-bd)"):"var(--bdr)"}`,
                background:custType===t?(t==="インバウンド"?"var(--warn-bg)":"var(--info-bg)"):"var(--bg)",
                color:custType===t?(t==="インバウンド"?"var(--warn)":"var(--info)"):"var(--txt2)",
                fontWeight:custType===t?500:400,
              }}>{t}</button>
            ))}
          </div>
        </div>

        <div style={S.card}>
          <label style={S.lbl}>メモ・備忘録</label>
          <textarea value={memo} onChange={e=>setMemo(e.target.value)} rows={3}
            placeholder="案件のメモ、気になったこと等"
            style={{...S.inp,padding:"8px 10px",lineHeight:1.6}}/>
        </div>

        {/* 必須項目チェック */}
        {(()=>{
          const missing=[];

          <div style={{background:"var(--bg)",borderRadius:"18px 18px 0 0",padding:"16px 14px 32px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <p style={{fontSize:15,fontWeight:500,margin:0}}>📝 シフトメモ</p>
              <div style={{display:"flex",gap:8}}>
                <button onClick={insertTime} style={{
                  padding:"5px 12px",borderRadius:16,cursor:"pointer",fontSize:12,
                  border:"0.5px solid var(--info-bd)",background:"var(--info-bg)",color:"var(--info)"
                }}>
                  <i className="ti ti-clock" style={{marginRight:3}}/>{getShiftNow()}を挿入
                </button>
                <button onClick={()=>setShowMemo(false)} style={{
                  padding:"5px 12px",borderRadius:16,cursor:"pointer",fontSize:12,
                  border:"0.5px solid var(--bdr2)",background:"var(--bg2)",color:"var(--txt2)"
                }}>閉じる</button>
              </div>
            </div>
            <textarea
              value={shiftMemo}
              onChange={e=>setShiftMemo(e.target.value)}
              placeholder={"[時刻を挿入] ボタンでタイムスタンプを追加\n例:\n[25:14] GOシステムエラー発生\n[28:30] 渋滞で遅延"}
              rows={8}
              style={{...S.inp,width:"100%",lineHeight:1.7,fontSize:14,padding:"10px",
                      resize:"none",boxSizing:"border-box"}}
            />
            {shiftMemo&&(
              <button onClick={()=>{if(confirm("メモを削除しますか？"))setShiftMemo("");}} style={{
                marginTop:6,padding:"4px 10px",background:"none",border:"none",
                fontSize:12,cursor:"pointer",color:"var(--err)"
              }}>メモを削除</button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
